name: Build pegasus-data docker image
on:
  push:

jobs:
  build-gradle-project:
    runs-on: ubuntu-latest
    steps:
      - name: Get branch names
        id: branch-names
        uses: tj-actions/branch-names@v8

      - name: Get current branch name
        if: steps.branch-names.outputs.is_default == 'false'
        run: |
          echo "Running on branch: ${{ steps.branch-names.outputs.current_branch }}"

      - name: Checkout project sources
        uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.5

      - name: Login to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.ENV_DOCKER_USER }}
          password: ${{ secrets.ENV_DOCKER_PASS }}

      - name: Run build with Gradle Wrapper
        run: ./gradlew build docker

      # Extract the image tag directly from Gradle — single source of truth.
      # This runs the same getCurrentGitBranch() logic the docker task used,
      # so the tag here is guaranteed to match what was just built.
      - name: Extract image tag from Gradle
        run: |
          IMAGE_TAG=$(./gradlew -q printImageTag)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "Built image tag: ${IMAGE_TAG}"

      - name: Push to Docker Hub
        run: docker push "${{ env.IMAGE_TAG }}"