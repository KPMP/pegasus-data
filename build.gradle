buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath("org.springframework.boot:spring-boot-gradle-plugin:4.0.0")
    }
}

plugins {
    id 'org.springframework.boot' version '4.0.0'
}

group = 'kingstonduo'
version = '3.3.0'

apply plugin: 'java'
apply plugin: 'eclipse'
apply plugin: 'idea'
apply plugin: 'org.springframework.boot'
apply plugin: 'io.spring.dependency-management'


repositories {
    mavenCentral()
}

sourceCompatibility = '21'
targetCompatibility = '21'

dependencies {
    runtimeOnly("org.springframework.boot:spring-boot-properties-migrator")
    
    implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-test'

    implementation "tools.jackson.core:jackson-databind:3.1.0"
    implementation 'com.fasterxml.jackson.core:jackson-annotations:3.0-rc5'
    implementation "tools.jackson.core:jackson-core:3.1.0"

    implementation 'commons-io:commons-io:2.16.1'
    implementation 'com.mysql:mysql-connector-j:9.0.0'
    implementation ("org.apache.commons:commons-compress:1.28.0")
    implementation 'org.apache.commons:commons-text:1.14.0'
    implementation 'org.springframework.boot:spring-boot-starter-graphql'
    implementation 'org.springframework.graphql:spring-graphql'
    implementation 'org.springframework.boot:spring-boot-starter-cache'
    implementation ("com.hazelcast:hazelcast")
    implementation 'com.graphql-java:graphql-java-extended-scalars:21.0'

    testImplementation('org.mockito:mockito-junit-jupiter')
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework:spring-test'
    testImplementation 'org.mockito:mockito-core'
    
}

springBoot {
    mainClass = "org.kpmp.Application"
}

task unpack(type: Copy) {
    dependsOn bootJar
    from(zipTree(tasks.bootJar.outputs.files.singleFile))
    into("build/dependency")
}

def getCurrentGitBranch() {
  if (project.hasProperty('tag')) {
    def tagValue = project.property('tag')
    return tagValue
  } else {
      def gitBranch = "Unknown branch"
      try {
        def workingDir = new File("${project.projectDir}")
        def result = 'git rev-parse --abbrev-ref HEAD'.execute(null, workingDir)
        result.waitFor()
        if (result.exitValue() == 0) {
            gitBranch = result.text.trim()
        }
      } catch (e) {
        }
        if (gitBranch == "develop" || gitBranch == "master"){
          return project.version
        }else{
          return gitBranch
        }
    }
}

bootBuildImage {
    imageName = "kingstonduo/pegasus-data:" + getCurrentGitBranch()
    createdDate = "now"
}